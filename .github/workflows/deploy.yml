# Nama workflow yang akan muncul di tab Actions di GitHub
name: Deploy Astro to Hostinger FTP

concurrency:
  group: tepatlaser-production
  cancel-in-progress: true

# Kapan workflow ini dijalankan
on:
  # Dijalankan setiap kali ada push ke branch 'main'
  push:
    branches: ["main"]
  # Bisa juga dijalankan manual dari tab Actions
  workflow_dispatch:

# Langkah-langkah yang akan dijalankan
jobs:
  # Nama job-nya
  build-and-deploy:
    runs-on: ubuntu-latest # Menjalankan job di mesin virtual Ubuntu
    steps:
      # 1. Mengambil kode dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Versi Node.js yang direkomendasikan untuk Astro V6
          cache: 'npm'

      # 3. Install semua dependencies
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build project Astro jadi file statis di folder 'dist'
      - name: Build Astro Project
        run: npm run build

      # 5. Ambil versi release dari build output untuk dipakai di step verifikasi
      - name: Read release version
        id: release
        run: |
          RELEASE=$(cat dist/release.json | python3 -c "import sys,json; print(json.load(sys.stdin)['release'])")
          echo "version=$RELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $RELEASE"

      # 6. Deploy ke Hostinger via FTP
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Alamat server FTP/SSH dari secret
          server: ${{ secrets.FTP_SERVER }}
          # Username FTP dari secret
          username: ${{ secrets.FTP_USERNAME }}
          # Password FTP dari secret
          password: ${{ secrets.FTP_PASSWORD }}
          # Folder hasil build Astro yang akan di-upload (dist bukan out)
          local-dir: ./dist/
          # Folder tujuan di hosting (sesuaikan dengan domain kamu)
          server-dir: ./
          # State file unik per run SHA — memaksa full upload setiap deploy
          state-name: .ftp-deploy-sync-state-v6.json
          # Exclude file tertentu jika perlu
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      # 7. Purge Cloudflare cache otomatis setelah FTP upload selesai
      - name: Purge Cloudflare Cache
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          echo "Purging Cloudflare cache for zone $CF_ZONE_ID..."
          RESPONSE=$(curl -s -o /tmp/cf_purge_response.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          cat /tmp/cf_purge_response.json

          if [ "$RESPONSE" = "200" ]; then
            SUCCESS=$(cat /tmp/cf_purge_response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
            if [ "$SUCCESS" = "True" ]; then
              echo "✅ Cloudflare cache purged successfully."
            else
              echo "⚠️ CF API returned 200 but success=false. Check token permissions."
              exit 1
            fi
          else
            echo "❌ CF API returned HTTP $RESPONSE. Purge failed."
            exit 1
          fi

      # 8. Verifikasi release marker live di publik (dinamis, baca dari build output)
      - name: Verify public release marker
        shell: bash
        env:
          EXPECTED_RELEASE: ${{ steps.release.outputs.version }}
        run: |
          echo "Waiting for release '$EXPECTED_RELEASE' to appear at tepatlaser.com..."
          for attempt in {1..18}; do
            LIVE=$(curl --fail --silent --show-error \
              "https://tepatlaser.com/release.json?bust=${GITHUB_SHA}-${attempt}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('release',''))" 2>/dev/null || echo "")

            echo "Attempt $attempt: live='$LIVE', expected='$EXPECTED_RELEASE'"

            if [ "$LIVE" = "$EXPECTED_RELEASE" ]; then
              echo "✅ Release '$EXPECTED_RELEASE' is now live!"
              exit 0
            fi
            sleep 10
          done

          echo "❌ Release marker '$EXPECTED_RELEASE' was not found on the public domain after 3 minutes."
          exit 1
