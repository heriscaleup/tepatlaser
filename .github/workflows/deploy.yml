# Nama workflow yang akan muncul di tab Actions di GitHub
name: Deploy Astro to Hostinger FTP

concurrency:
  group: tepatlaser-production
  cancel-in-progress: true

# Kapan workflow ini dijalankan
on:
  # Dijalankan setiap kali ada push ke branch 'main'
  push:
    branches: ["main"]
  # Bisa juga dijalankan manual dari tab Actions
  workflow_dispatch:

# Langkah-langkah yang akan dijalankan
jobs:
  # Nama job-nya
  build-and-deploy:
    runs-on: ubuntu-latest # Menjalankan job di mesin virtual Ubuntu
    steps:
      # 1. Mengambil kode dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Versi Node.js yang direkomendasikan untuk Astro V6
          cache: 'npm'

      # 3. Install semua dependencies
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build project Astro jadi file statis di folder 'dist'
      - name: Build Astro Project
        run: npm run build

      # 5. Deploy ke Hostinger via FTP
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Alamat server FTP/SSH dari secret
          server: ${{ secrets.FTP_SERVER }}
          # Username FTP dari secret
          username: ${{ secrets.FTP_USERNAME }}
          # Password FTP dari secret
          password: ${{ secrets.FTP_PASSWORD }}
          # Folder hasil build Astro yang akan di-upload (dist bukan out)
          local-dir: ./dist/
          # Folder tujuan di hosting (sesuaikan dengan domain kamu)
          server-dir: ./
          # Nama state baru memaksa seluruh build V5 diunggah ulang, bukan hanya
          # file yang dianggap berubah oleh state deployment generasi sebelumnya.
          state-name: .ftp-deploy-sync-state-v5.json
          # Exclude file tertentu jika perlu
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Verify public release marker
        shell: bash
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error "https://tepatlaser.com/release.json?check=${GITHUB_SHA}-${attempt}" | grep -q '"release": "v5-2026-07-17"'; then
              echo "Release V5 is live."
              exit 0
            fi
            sleep 10
          done
          echo "Release marker V5 was not found on the public domain."
          exit 1
